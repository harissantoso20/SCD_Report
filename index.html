<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Dashboard & Data Entry - SCD Bukit Asam</title>
  
  <!-- Tailwind CSS via CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- React & ReactDOM via CDN -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <!-- Babel via CDN -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Leaflet CSS & JS (Untuk Peta Interaktif) -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

  <!-- Recharts (Untuk Grafik Tren) & Dependencies -->
  <script crossorigin src="https://unpkg.com/react-is@18/umd/react-is.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
  <script crossorigin src="https://unpkg.com/recharts@2.1.12/umd/Recharts.js"></script>

  <style>
    /* Custom Scrollbar CSS (Global) */
    body { overflow-x: hidden; }
    .minimal-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
    .minimal-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .minimal-scrollbar::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 10px; }
    .minimal-scrollbar::-webkit-scrollbar-thumb:hover { background-color: #94a3b8; }
    
    /* Isolasi Z-Index Leaflet agar tidak menutupi Dropdown Tailwind */
    .leaflet-container {
      z-index: 10 !important;
      border-radius: 0.5rem;
    }
    
    /* Memastikan navigasi selalu di atas saat fullscreen */
    header { z-index: 9999 !important; }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- Aplikasi React -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;
    const { LineChart, Line, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer } = window.Recharts;

    // --- KOMPONEN IKON INLINE ---
    const Calendar = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></svg>;
    const ChevronDown = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m6 9 6 6 6-6"/></svg>;
    const Edit2 = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/><path d="m15 5 4 4"/></svg>;
    const UploadCloud = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M4 14.899A7 7 0 1 1 15.71 8h1.79a4.5 4.5 0 0 1 2.5 8.242"/><path d="M12 12v9"/><path d="m16 16-4-4-4 4"/></svg>;
    const Save = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>;
    const CheckCircle = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><path d="m9 11 3 3L22 4"/></svg>;
    const Plus = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M5 12h14"/><path d="M12 5v14"/></svg>;
    const FileText = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><line x1="10" y1="9" x2="8" y2="9"/></svg>;
    const TrendingUp = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg>;
    const Paperclip = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m21.44 11.05-9.19 9.19a6 6 0 0 1-8.49-8.49l8.57-8.57A4 4 0 1 1 18 8.84l-8.59 8.57a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>;
    const TableIcon = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/><line x1="9" y1="9" x2="9" y2="21"/><line x1="15" y1="9" x2="15" y2="21"/></svg>;
    const Building = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="4" y="2" width="16" height="20" rx="2" ry="2"/><path d="M9 22v-4h6v4"/><path d="M8 6h.01"/><path d="M16 6h.01"/><path d="M12 6h.01"/><path d="M12 10h.01"/><path d="M12 14h.01"/><path d="M16 10h.01"/><path d="M16 14h.01"/><path d="M8 10h.01"/><path d="M8 14h.01"/></svg>;
    const MapPin = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>;
    const Zap = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>;
    const Users = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>;
    const FileImage = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><circle cx="10" cy="13" r="2"/><path d="m20 17-1.09-1.09a2 2 0 0 0-2.82 0L10 22"/></svg>;

    // --- DATA MASTER ---
    const PROGRAMS = [
      "PLTS Irigasi", "Budidaya Maggot BSF", "Budidaya Ikan Air Tawar", "SIBA Pembibitan", 
      "Budidaya Puyuh Petelur (Seleman)", "Budidaya Puyuh Petelur (Darmo)", "EcoGrow Mom Utun Makmur", 
      "Poktan Cahaya Tani", "Budidaya Itik Petelur", "Suscomdev Lingkar Tambang", "Suscomdev Sirah Pulau", 
      "Suscomdev Prabumenang", "Budidaya Ikan RAS System", "BA-MAXI", "PROKLIM"
    ];

    const PROGRAM_IMAGES = {
      "PLTS Irigasi": "https://images.unsplash.com/photo-1509391366360-1e97b524c5bb?auto=format&fit=crop&w=1200&q=80",
      "Budidaya Maggot BSF": "https://images.unsplash.com/photo-1586771107445-d3afef11d0b9?auto=format&fit=crop&w=1200&q=80",
      "Budidaya Ikan Air Tawar": "https://images.unsplash.com/photo-1524704654690-b56c05c78a00?auto=format&fit=crop&w=1200&q=80",
      "SIBA Pembibitan": "https://images.unsplash.com/photo-1592424001807-6b45f448b1bb?auto=format&fit=crop&w=1200&q=80",
      "EcoGrow Mom Utun Makmur": "https://images.unsplash.com/photo-1595841696677-6489ff3f8cd1?auto=format&fit=crop&w=1200&q=80",
      "BA-MAXI": "https://images.unsplash.com/photo-1604871000636-074fa5117945?auto=format&fit=crop&w=1200&q=80",
      "PROKLIM": "https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?auto=format&fit=crop&w=1200&q=80",
      "default": "https://images.unsplash.com/photo-1500382017468-9049fed747ef?auto=format&fit=crop&w=1200&q=80"
    };

    const PROGRAM_DETAILS = {
      "PLTS Irigasi": {
        desc: "Meningkatkan produktivitas pertanian melalui pemanfaatan energi terbarukan berupa PLTS untuk sistem pompa irigasi guna menjamin ketersediaan air secara efisien, hemat biaya, dan ramah lingkungan.",
        lokasi: "Tanjung Enim Mining Site, Tarahan Port, Ombilin Mining Site",
        penerima: "Kelompok Tani / Petani Sawah Tadah Hujan",
        objektif: "Unit PLTS irigasi beroperasi dengan tingkat utilisasi 285%. Peningkatan IP dari 1x menjadi 2-3x tanam per tahun.",
        tpb: "TPB 7 - Energi Bersih dan Terjangkau",
        anggaran: "Rp 1.766.000.000",
        realisasi: "Rp 139.286.026"
      },
      "Budidaya Maggot BSF": {
        desc: "Meningkatkan kemandirian ekonomi masyarakat melalui pengelolaan sampah organik berbasis budidaya maggot (BSF) sebagai sumber pakan alternatif dan produk bernilai.",
        lokasi: "Desa Keban Agung, Lawang Kidul",
        penerima: "Kelompok Masyarakat Pengelola Sampah",
        objektif: "Tereduksinya sampah organik minimal 5 ton/bulan dan produksi maggot stabil untuk subtitusi pakan ternak warga lokal.",
        tpb: "TPB 8 & 12 - Pertumbuhan Ekonomi & Konsumsi Bertanggung Jawab",
        anggaran: "Rp 450.000.000",
        realisasi: "Rp 85.500.000"
      },
      "default": {
        desc: "Meningkatkan kesejahteraan masyarakat lingkar tambang melalui program pemberdayaan ekonomi dan pelestarian lingkungan yang berkelanjutan.",
        lokasi: "Area Ring 1 PT Bukit Asam",
        penerima: "Masyarakat Umum & Kelompok Binaan",
        objektif: "Mewujudkan kemandirian finansial kelompok mitra binaan secara konsisten.",
        tpb: "TPB 1 - Tanpa Kemiskinan",
        anggaran: "Rp 1.000.000.000",
        realisasi: "Rp 250.000.000"
      }
    };

    // --- KOORDINAT LOKASI PETA (Khusus PLTS Irigasi) ---
    const MAP_LOCATIONS = [
      { id: 1, nama: "Desa Talawi (Sawahlunto)", lat: -0.681, lng: 100.772, kwp: 18.7, luas: 19, petani: 60 },
      { id: 2, nama: "Desa Nanjungan (Lahat)", lat: -3.801, lng: 103.541, kwp: 27.5, luas: 83, petani: 60 },
      { id: 3, nama: "Desa Muara Gula Baru", lat: -3.652, lng: 103.784, kwp: 7.14, luas: 4, petani: 20 },
      { id: 4, nama: "Desa Trimulyo (Lampung Sel.)", lat: -5.451, lng: 105.502, kwp: 38.5, luas: 128, petani: 154 },
      { id: 5, nama: "Desa Lugusari (Pringsewu)", lat: -5.353, lng: 104.974, kwp: 23.4, luas: 153, petani: 234 },
      { id: 6, nama: "Desa Rejosari (Lampung Teng.)", lat: -5.102, lng: 105.201, kwp: 52.8, luas: 50, petani: 100 }
    ];

    // --- MOCK DATA CHART OMZET ---
    const CHART_DATA_SALES = [
      { bulan: 'Jan', Omzet: 12000000 },
      { bulan: 'Feb', Omzet: 17100000 },
      { bulan: 'Mar', Omzet: 24000000 },
      { bulan: 'Apr', Omzet: 39000000 },
      { bulan: 'Mei', Omzet: 57100000 }
    ];


    // ==========================================
    // MODUL 1: DASHBOARD VIEW (FASE 2)
    // ==========================================
    function DashboardView({ selectedProgram, selectedDate, setSelectedProgram, setSelectedDate }) {
      const getBannerImage = () => PROGRAM_IMAGES[selectedProgram] || PROGRAM_IMAGES["default"];
      const getDetails = () => PROGRAM_DETAILS[selectedProgram] || PROGRAM_DETAILS["default"];
      const isSalesProgram = ["Budidaya Maggot BSF", "Budidaya Ikan Air Tawar", "SIBA Pembibitan", "Budidaya Puyuh Petelur (Seleman)", "Budidaya Puyuh Petelur (Darmo)", "EcoGrow Mom Utun Makmur", "Poktan Cahaya Tani", "Budidaya Itik Petelur"].includes(selectedProgram);
      const mapRef = useRef(null);

      // Inisialisasi Peta Leaflet (Berjalan hanya saat program PLTS dipilih)
      useEffect(() => {
        if (selectedProgram !== "PLTS Irigasi" || !mapRef.current) return;
        
        if (mapRef.current._leaflet_id) {
          mapRef.current._leaflet_id = null;
          mapRef.current.innerHTML = '';
        }

        const map = L.map(mapRef.current).setView([-3.5, 103.5], 6);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
          attribution: '&copy; OpenStreetMap'
        }).addTo(map);

        MAP_LOCATIONS.forEach(loc => {
          L.marker([loc.lat, loc.lng]).addTo(map)
            .bindPopup(`
              <div class="text-xs">
                <b class="text-[#1e3a8a] text-sm">${loc.nama}</b><br/>
                Kapasitas: ${loc.kwp} kWp<br/>
                Luas Lahan: ${loc.luas} Ha<br/>
                Penerima Manfaat: ${loc.petani} Petani
              </div>
            `);
        });

        return () => map.remove();
      }, [selectedProgram]);

      // Formatter Rupiah untuk LineChart
      const formatRupiahChart = (value) => `Rp ${(value / 1000000).toFixed(1)} Jt`;
      const details = getDetails();

      return (
        <div className="flex flex-col gap-10">
          
          {/* Header Layout Dashboard */}
          <div className="flex flex-col lg:flex-row gap-6 items-stretch">
            <div className="lg:w-1/2 flex flex-col justify-between">
              <div>
                <h2 className="text-3xl font-extrabold text-[#1e3a8a] mb-3 tracking-tight leading-tight">{selectedProgram}</h2>
                <p className="text-gray-600 font-medium text-[13.5px] pr-4 leading-relaxed border-l-4 border-[#1e3a8a] pl-3">
                  {details.desc}
                </p>
              </div>

              <div className="bg-white p-4 rounded-md shadow-sm border border-gray-200 flex flex-col sm:flex-row gap-4 relative z-50 mt-6 lg:mt-0">
                <div className="flex-1 relative">
                  <label className="block text-[11px] uppercase tracking-wider font-bold text-gray-500 mb-1.5">Periode</label>
                  <input type="date" className="w-full border border-gray-300 rounded-sm p-2 pl-3 text-sm text-gray-800 focus:outline-none focus:border-[#1e3a8a] focus:ring-1 focus:ring-[#1e3a8a] transition-shadow" value={selectedDate} onChange={(e) => setSelectedDate(e.target.value)} />
                </div>
                <div className="flex-1 relative z-50">
                  <label className="block text-[11px] uppercase tracking-wider font-bold text-gray-500 mb-1.5">Program</label>
                  <div className="relative">
                    <select className="w-full border border-gray-300 rounded-sm p-2 pl-3 text-sm text-gray-800 appearance-none focus:outline-none focus:border-[#1e3a8a] focus:ring-1 focus:ring-[#1e3a8a] bg-white cursor-pointer transition-shadow" value={selectedProgram} onChange={(e) => setSelectedProgram(e.target.value)}>
                      {PROGRAMS.map(prog => <option key={prog} value={prog}>{prog}</option>)}
                    </select>
                    <ChevronDown className="absolute right-2.5 top-2.5 text-gray-400 pointer-events-none" size={16} />
                  </div>
                </div>
              </div>
            </div>

            <div className="lg:w-1/2 rounded-md overflow-hidden border border-gray-200 shadow-sm relative min-h-[220px] lg:min-h-0">
              <img src={getBannerImage()} alt={`Banner ${selectedProgram}`} className="absolute inset-0 w-full h-full object-cover object-center" />
            </div>
          </div>

          {/* VISUALISASI KONDISIONAL (LEVEL 2) */}
          {selectedProgram === "PLTS Irigasi" ? (
            <section className="bg-white rounded-md shadow-sm border border-gray-200 p-5 md:p-6">
              <h2 className="text-[14px] font-bold text-[#25326a] uppercase tracking-wider border-b border-gray-200 pb-2 mb-5 flex items-center gap-2">
                <MapPin size={18} className="text-[#1e3a8a]" />
                SEBARAN LOKASI PROGRAM
              </h2>
              <div className="flex flex-col lg:flex-row gap-6">
                <div className="lg:w-2/3 h-[420px] w-full border border-gray-300 rounded overflow-hidden" ref={mapRef}></div>
                
                <div className="lg:w-1/3 flex flex-col gap-4 justify-center">
                  <div className="bg-blue-50/50 p-4 rounded border border-blue-100 flex items-center gap-4 hover:shadow-sm transition-shadow">
                    <div className="bg-white p-2.5 rounded text-[#1e3a8a] shadow-sm"><Building size={24} /></div>
                    <div><p className="text-[10px] font-bold text-gray-500 uppercase tracking-widest">EXISTING</p><p className="text-xl font-extrabold text-[#25326a]">11 <span className="text-sm font-semibold text-gray-600">Unit</span></p></div>
                  </div>
                  <div className="bg-blue-50/50 p-4 rounded border border-blue-100 flex items-center gap-4 hover:shadow-sm transition-shadow">
                    <div className="bg-white p-2.5 rounded text-[#1e3a8a] shadow-sm"><MapPin size={24} /></div>
                    <div><p className="text-[10px] font-bold text-gray-500 uppercase tracking-widest">TOTAL LUAS LAHAN</p><p className="text-xl font-extrabold text-[#25326a]">638 <span className="text-sm font-semibold text-gray-600">Ha</span></p></div>
                  </div>
                  <div className="bg-blue-50/50 p-4 rounded border border-blue-100 flex items-center gap-4 hover:shadow-sm transition-shadow">
                    <div className="bg-white p-2.5 rounded text-[#1e3a8a] shadow-sm"><Zap size={24} /></div>
                    <div><p className="text-[10px] font-bold text-gray-500 uppercase tracking-widest">TOTAL KAPASITAS</p><p className="text-xl font-extrabold text-[#25326a]">318 <span className="text-sm font-semibold text-gray-600">kWp</span></p></div>
                  </div>
                  <div className="bg-blue-50/50 p-4 rounded border border-blue-100 flex items-center gap-4 hover:shadow-sm transition-shadow">
                    <div className="bg-white p-2.5 rounded text-[#1e3a8a] shadow-sm"><Users size={24} /></div>
                    <div><p className="text-[10px] font-bold text-gray-500 uppercase tracking-widest">PENERIMA MANFAAT</p><p className="text-xl font-extrabold text-[#25326a]">1.189 <span className="text-sm font-semibold text-gray-600">Petani</span></p></div>
                  </div>
                </div>
              </div>
            </section>
          ) : isSalesProgram ? (
            <section className="bg-white rounded-md shadow-sm border border-gray-200 p-5 md:p-6">
              <h2 className="text-[14px] font-bold text-[#25326a] uppercase tracking-wider border-b border-gray-200 pb-2 mb-5 flex items-center gap-2">
                <TrendingUp size={18} className="text-[#1e3a8a]" />
                OVERVIEW
              </h2>
              <div className="flex flex-col lg:flex-row gap-8">
                <div className="lg:w-2/3 flex flex-col">
                  <div className="h-[300px] w-full pr-4">
                    <ResponsiveContainer width="100%" height="100%">
                      <LineChart data={CHART_DATA_SALES} margin={{ top: 20, right: 10, left: 10, bottom: 5 }}>
                        <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#e5e7eb" />
                        <XAxis dataKey="bulan" axisLine={false} tickLine={false} tick={{fontSize: 12, fill: '#6b7280'}} dy={10} />
                        <YAxis tickFormatter={formatRupiahChart} axisLine={false} tickLine={false} tick={{fontSize: 12, fill: '#6b7280'}} dx={-10} />
                        <Tooltip 
                          formatter={(value) => [new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(value), "Total Omzet"]}
                          contentStyle={{ borderRadius: '8px', border: '1px solid #e5e7eb', boxShadow: '0 4px 6px -1px rgb(0 0 0 / 0.1)' }}
                        />
                        <Line type="monotone" dataKey="Omzet" stroke="#1e3a8a" strokeWidth={3} dot={{ r: 4, fill: '#1e3a8a', strokeWidth: 2, stroke: '#fff' }} activeDot={{ r: 6 }} />
                      </LineChart>
                    </ResponsiveContainer>
                  </div>
                  
                  <div className="mt-8">
                    <h3 className="text-xs font-bold text-gray-500 uppercase tracking-widest mb-3 border-l-4 border-yellow-400 pl-2">REKAPITULASI YEAR TO DATE (YTD)</h3>
                    <div className="overflow-x-auto border border-gray-200 rounded shadow-sm">

        const currentMonthIndex = d.getMonth();

      };
      const monthLabels = getMonthNames(selectedDate);

      const [contextData, setContextData] = useState({ anggaran: "Rp 1.766.000.000", tpb: "TPB 1, 8, 13 (Tanpa Kemiskinan, Pekerjaan Layak, Penanganan Perubahan Iklim)", lokasi: "Desa Talawi, Tanjung Karangan, Matas", penerimaManfaat: "Kelompok Tani, Masyarakat Lingkar Tambang", kpi: "", objektif: "" });

          )}

          <section className="border border-gray-200 rounded-md p-5 bg-white shadow-sm">
            <div className="flex flex-col md:flex-row justify-between items-end border-b border-gray-200 pb-3 mb-5 gap-5"><h2 className="text-[14px] font-bold text-[#25326a] uppercase flex gap-2"><TrendingUp size={18} className="text-[#1e3a8a]"/>Progres Bulanan</h2><div className="w-full md:w-[30%]"><label className="block text-[13px] font-bold text-gray-800 mb-1.5">Realisasi Anggaran</label><div className="relative"><span className="absolute left-3 top-2 text-[13px] font-bold">Rp.</span><input type="text" className="w-full border border-gray-300 rounded-sm py-2 pl-9 pr-3 text-[13px] focus:ring-[#1e3a8a]" /></div></div></div>
            <div className="flex flex-col gap-5">
              <div><label className="block text-[13px] font-bold mb-1.5">Realisasi Bulan {monthLabels.prev}</label><textarea className="w-full border border-gray-300 rounded-sm p-3 text-[13px] min-h-[120px]" /></div>
              <div><label className="block text-[13px] font-bold mb-1.5">Rencana Bulan {monthLabels.next}</label><textarea className="w-full border border-gray-300 rounded-sm p-3 text-[13px] min-h-[120px]" /></div>
            </div>
          </section>

          {selectedProgram !== "PLTS Irigasi" && <section className="w-full">{renderDynamicTables()}</section>}

          <section className="border border-gray-200 rounded-md p-5 bg-white shadow-sm">
            <h2 className="text-[14px] font-bold text-[#25326a] uppercase border-b pb-2 mb-5 flex gap-2"><Paperclip size={18} className="text-[#1e3a8a]"/>Eviden Progres</h2>
            <label htmlFor="eviden-upload" className="border-2 border-dashed border-gray-300 rounded-md p-6 flex flex-col items-center justify-center text-center bg-gray-50/50 hover:bg-gray-50 cursor-pointer"><UploadCloud size={32} className="text-[#1e3a8a] mb-3" /><p className="font-bold text-[14px] mb-1">Klik untuk unggah atau seret dan lepas</p><p className="text-gray-500 text-[12px] mb-4">Tambahkan dokumentasi foto progres program (Hanya Format: PNG, JPG, JPEG)</p><span className="bg-white border border-gray-300 px-4 py-2 rounded text-xs font-semibold text-gray-700 hover:bg-gray-100 shadow-sm">Pilih File</span><input id="eviden-upload" type="file" accept=".png, .jpg, .jpeg, image/png, image/jpeg" className="hidden" /></label>
          </section>

          <div className="flex justify-end pt-5 border-t border-gray-200"><div className="flex items-center gap-3">{showSuccess && <span className="flex items-center text-green-600 font-medium text-xs animate-pulse"><CheckCircle size={14} className="mr-1" /> Berhasil Disimpan</span>}<button onClick={handleSave} className="bg-[#1e3a8a] hover:bg-blue-900 text-white font-semibold text-sm py-2 px-6 rounded-md flex items-center gap-2 shadow-sm"><Save size={16} />Simpan Progress</button></div></div>
        </div>
      );
    }


    // ==========================================
    // ROOT APP COMPONENT & NAVIGATION TABS
    // ==========================================
    function App() {
      const [activeTab, setActiveTab] = useState("Dashboard");
      const [globalProgram, setGlobalProgram] = useState("PLTS Irigasi");
      const [globalDate, setGlobalDate] = useState(new Date().toISOString().split('T')[0]);

      return (
        <div className="min-h-screen bg-[#f8f9fa] flex flex-col w-full">
          
          {/* Header Global dengan Navigasi Tab */}
          <header className="bg-white border-b border-gray-200 sticky top-0 px-6 py-4 flex items-center justify-between shadow-sm w-full">
            <div className="flex items-center gap-3">
              <div className="w-8 h-8 bg-[#1e3a8a] rounded-md flex items-center justify-center text-white font-bold text-lg">BA</div>
              <h1 className="text-lg font-bold text-[#1e3a8a]">Bukit Asam</h1>
            </div>
            <nav className="flex gap-6 font-bold text-xs uppercase tracking-wide">
              <button 
                onClick={() => setActiveTab("Dashboard")}
                className={`transition-colors ${activeTab === "Dashboard" ? "text-[#1e3a8a] border-b-2 border-[#1e3a8a] pb-1" : "text-gray-400 hover:text-[#1e3a8a]"}`}
              >Dashboard</button>
              <button 
                onClick={() => setActiveTab("Data Entry")}
                className={`transition-colors ${activeTab === "Data Entry" ? "text-[#1e3a8a] border-b-2 border-[#1e3a8a] pb-1" : "text-gray-400 hover:text-[#1e3a8a]"}`}
              >Data Entry</button>
            </nav>
          </header>

          <main className="flex-1 w-full p-4 md:p-6 lg:max-w-7xl lg:mx-auto">
            {activeTab === "Dashboard" ? (
              <DashboardView 
                selectedProgram={globalProgram} setSelectedProgram={setGlobalProgram}
                selectedDate={globalDate} setSelectedDate={setGlobalDate}
              />
            ) : (
              <DataEntryView 
                selectedProgram={globalProgram} setSelectedProgram={setGlobalProgram}
                selectedDate={globalDate} setSelectedDate={setGlobalDate}
              />
            )}
          </main>

          {/* Global Footer (Copyright & Version) */}
          <footer className="w-full text-center py-6 mt-auto">
            <p className="text-gray-500 text-[13px] font-medium">© 2026 Sustainable Community Development</p>
            <p className="text-[11px] text-gray-400 mt-1.5 font-mono">Version: v1.0.7</p>
          </footer>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
